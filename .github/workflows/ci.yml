name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  test:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:ci

  version-check:
    name: Version Bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR version
        id: pr_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get main version
        id: main_version
        run: |
          git fetch origin main
          echo "version=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")" >> $GITHUB_OUTPUT

      - name: Fail if version not bumped
        run: |
          PR="${{ steps.pr_version.outputs.version }}"
          MAIN="${{ steps.main_version.outputs.version }}"
          echo "PR version: $PR"
          echo "Main version: $MAIN"
          if [ "$PR" = "$MAIN" ]; then
            echo "❌ Version not bumped. Current: $PR (same as main). Update version in package.json before merging."
            exit 1
          fi
          echo "✅ Version bumped: $MAIN → $PR"
